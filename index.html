<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lunária Confeitaria</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Crimson+Text:ital,wght=0,400;0,600;1,400&family=MedievalSharp&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --vinho: #6B0D1A;
      --vinho-escuro: #3D0710;
      --vinho-medio: #8B1220;
      --dourado: #C9A227;
      --dourado-claro: #E8C84A;
      --dourado-escuro: #9A7A1A;
      --marrom: #5C3317;
      --creme: #F5E6C8;
      --creme-escuro: #E8D4A8;
      --branco: #FFF9F0;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: var(--vinho-escuro);
      color: var(--creme);
      font-family: 'Quicksand', sans-serif; /* Transição para fonte aconchegante */
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    /* ============================================================
       CABEÇALHO ORIGINAL PRESERVADO
       ============================================================ */
    header {
      background: linear-gradient(135deg, var(--vinho-escuro), var(--vinho));
      padding: 30px 20px;
      text-align: center;
      border-bottom: 3px double var(--dourado);
      box-shadow: 0 4px 20px rgba(0,0,0,0.6);
      position: relative;
    }

    header h1 {
      font-family: 'Cinzel Decorative', serif;
      font-weight: 900;
      color: var(--dourado);
      font-size: 2.8rem;
      letter-spacing: 2px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.8), 0 0 10px var(--dourado-escuro);
      margin-bottom: 5px;
    }

    header p {
      font-family: 'MedievalSharp', cursive;
      color: var(--creme-escuro);
      font-size: 1.1rem;
      letter-spacing: 1px;
    }

    /* ============================================================
       NAVEGAÇÃO DE CATEGORIAS (FORMATO RETANGULAR ORGÂNICO)
       ============================================================ */
    nav {
      display: flex;
      justify-content: center;
      gap: 10px;
      padding: 15px;
      background-color: rgba(61, 7, 16, 0.8);
      position: sticky;
      top: 0;
      z-index: 99;
      backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(201, 162, 39, 0.3);
    }

    .nav-btn {
      background: transparent;
      border: 1px solid var(--dourado-escuro);
      color: var(--creme-escuro);
      padding: 10px 20px;
      cursor: pointer;
      font-family: 'Quicksand', sans-serif;
      font-weight: 600;
      font-size: 0.95rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.3s ease;
      border-radius: 0px; /* Removido o arredondado conforme solicitado */
    }

    .nav-btn:hover, .nav-btn.active {
      background-color: var(--dourado);
      color: var(--vinho-escuro);
      border-color: var(--dourado-claro);
      box-shadow: 0 0 12px rgba(201, 162, 39, 0.4);
    }

    /* ============================================================
       LANDING PAGES E LAYOUT DE PRODUTOS
       ============================================================ */
    main {
      flex: 1;
      max-width: 1200px;
      width: 100%;
      margin: 0 auto;
      padding: 30px 20px;
    }

    .page { display: none; }
    .page.active { display: block; animation: fadeIn 0.5s ease-in-out; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 30px;
      padding: 10px 0;
    }

    /* CARDS MODERNOS E ORGÂNICOS */
    .product-card {
      background: linear-gradient(145deg, rgba(107, 13, 26, 0.4), rgba(61, 7, 16, 0.6));
      border: 1px solid rgba(201, 162, 39, 0.2);
      border-radius: 8px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s ease;
      cursor: pointer;
      position: relative;
    }

    .product-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5), 0 0 15px rgba(201, 162, 39, 0.15);
      border-color: rgba(201, 162, 39, 0.5);
    }

    .product-img-container {
      width: 100%;
      height: 220px;
      overflow: hidden;
      position: relative;
      background-color: rgba(0,0,0,0.2);
    }

    .product-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s ease;
    }

    .product-card:hover img {
      transform: scale(1.06);
    }

    .product-info {
      padding: 20px;
      display: flex;
      flex-direction: column;
      flex-grow: 1;
    }

    .product-title {
      font-family: 'Crimson Text', serif;
      font-size: 1.4rem;
      font-weight: 600;
      color: var(--branco);
      margin-bottom: 8px;
      line-height: 1.2;
    }

    .product-desc {
      font-size: 0.9rem;
      color: var(--creme-escuro);
      line-height: 1.5;
      margin-bottom: 15px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .product-meta {
      margin-top: auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      pt: 10px;
    }

    .product-price {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--dourado-claro);
    }

    .btn-add {
      background-color: var(--vinho-medio);
      color: var(--branco);
      border: 1px solid var(--dourado);
      padding: 8px 14px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      text-transform: uppercase;
    }

    .btn-add:hover {
      background-color: var(--dourado);
      color: var(--vinho-escuro);
      box-shadow: 0 0 10px var(--dourado);
    }

    /* ============================================================
       MODAL DE DETALHES DO PRODUTO (VER MAIS) - NOVO!
       ============================================================ */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(6px);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .modal-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .modal-card {
      background: linear-gradient(135deg, var(--vinho-escuro), #4a0a13);
      border: 2px solid var(--dourado);
      width: 90%;
      max-width: 650px;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(0,0,0,0.8);
      position: relative;
      transform: scale(0.9);
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .modal-overlay.active .modal-card {
      transform: scale(1);
    }

    .modal-close {
      position: absolute;
      top: 15px;
      right: 15px;
      background: rgba(0,0,0,0.5);
      border: 1px solid var(--dourado);
      color: var(--dourado);
      width: 35px;
      height: 35px;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      font-size: 1.2rem;
      z-index: 10;
      transition: all 0.2s ease;
    }

    .modal-close:hover {
      background: var(--dourado);
      color: var(--vinho-escuro);
    }

    .modal-img {
      width: 100%;
      height: 300px;
      object-fit: cover;
      border-bottom: 2px solid var(--dourado);
    }

    .modal-body {
      padding: 25px;
    }

    .modal-title {
      font-family: 'Cinzel Decorative', serif;
      color: var(--dourado);
      font-size: 1.8rem;
      margin-bottom: 10px;
    }

    .modal-full-desc {
      font-size: 1rem;
      color: var(--creme);
      line-height: 1.6;
      margin-bottom: 20px;
    }

    .modal-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid rgba(201, 162, 39, 0.2);
      padding-top: 15px;
    }

    /* ============================================================
       CARRINHO E DEMAIS ESTILOS
       ============================================================ */
    .cart-summary {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background-color: var(--dourado);
      color: var(--vinho-escuro);
      padding: 15px 25px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
      display: none;
      z-index: 98;
      font-family: 'Quicksand', sans-serif;
      transition: transform 0.2s ease;
    }
    .cart-summary:hover { transform: scale(1.05); }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background-color: var(--creme);
      color: var(--marrom);
      padding: 12px 25px;
      font-weight: 600;
      box-shadow: 0 5px 15px rgba(0,0,0,0.4);
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      z-index: 1001;
      border-left: 5px solid var(--vinho);
    }
    #toast.show { transform: translateX(-50%) translateY(0); }

    /* Admin Login Simple Style */
    .admin-box {
      max-width: 400px;
      margin: 80px auto;
      background: rgba(107, 13, 26, 0.3);
      padding: 30px;
      border: 1px solid var(--dourado);
      text-align: center;
    }
    .admin-box input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      background: var(--branco);
      border: none;
      font-family: 'Quicksand', sans-serif;
    }
    .admin-box button {
      background: var(--dourado);
      color: var(--vinho-escuro);
      padding: 10px 20px;
      border: none;
      cursor: pointer;
      font-weight: 700;
      width: 100%;
    }
  </style>
</head>
<body>

  <header>
    <h1>Lunária</h1>
    <p>Confeitaria Artesanal & Mística</p>
  </header>

  <nav id="category-nav">
    </nav>

  <main id="pages-container">
    <div id="page-admin-login" class="page">
      <div class="admin-box">
        <h3>Portal Arcano</h3>
        <input type="password" id="admin-password" placeholder="Chave de Acesso" />
        <button onclick="loginAdmin()">Entrar</button>
      </div>
    </div>
  </main>

  <div class="modal-overlay" id="product-modal" onclick="closeProductModal(event)">
    <div class="modal-card" onclick="event.stopPropagation()">
      <button class="modal-close" onclick="closeProductModal(forced=true)">✕</button>
      <img src="" alt="" class="modal-img" id="modal-product-img">
      <div class="modal-body">
        <h2 class="modal-title" id="modal-product-title"></h2>
        <p class="modal-full-desc" id="modal-product-desc"></p>
        <div class="modal-footer">
          <span class="product-price" id="modal-product-price"></span>
          <button class="btn-add" id="modal-product-action">Adicionar ao Pedido</button>
        </div>
      </div>
    </div>
  </div>

  <div class="cart-summary" id="cart-summary" onclick="checkoutWhatsApp()">
    Ver Sacola (<span id="cart-count">0</span>)
  </div>

  <div id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // Configurações do Supabase obtidas do seu arquivo original
    const SUPABASE_URL = "https://wbmshfofg77777777777.supabase.co"; 
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9... (sua chave original)";
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // Dados Locais / Cache
    let categories = [
      { id: 'cones', name: 'Cones Trufados', active: true },
      { id: 'brownies', name: 'Brownies', active: true }
    ];
    let products = [];
    let cart = {};

    // ============================================================
    //  INICIALIZAÇÃO & DADOS
    // ============================================================
    window.addEventListener('DOMContentLoaded', () => {
      if (window.location.hash === '#admin-lunaria') {
        showPage('admin-login');
      } else {
        renderCategoryPages();
        renderNav();
        
        // Carrega do banco de dados (suporta novas fotos adicionadas livremente)
        Promise.all([loadCategories(), loadProducts()])
          .then(() => {
            renderCategoryPages();
            renderNav();
          })
          .catch(err => console.log("Nota: Usando dados locais pré-renderizados.", err));
      }
    });

    async function loadCategories() {
      const { data, error } = await _supabase.from('categories').select('*').order('id');
      if (!error && data && data.length > 0) categories = data;
    }

    async function loadProducts() {
      const { data, error } = await _supabase.from('products').select('*');
      if (!error && data) products = data;
    }

    // ============================================================
    //  RENDERIZADORES DO SEU SISTEMA DE LANDING PAGES
    // ============================================================
    function renderNav() {
      const nav = document.getElementById('category-nav');
      nav.innerHTML = '';
      categories.filter(c => c.active !== false).forEach((cat, index) => {
        const btn = document.createElement('button');
        btn.className = `nav-btn ${index === 0 ? 'active' : ''}`;
        btn.textContent = cat.name;
        btn.onclick = () => switchCategory(cat.id, btn);
        nav.appendChild(btn);
      });
    }

    function renderCategoryPages() {
      const container = document.getElementById('pages-container');
      
      // Limpa páginas antigas preservando a de login admin
      const adminPage = document.getElementById('page-admin-login');
      container.innerHTML = '';
      container.appendChild(adminPage);

      categories.filter(c => c.active !== false).forEach((cat, index) => {
        const pageDiv = document.createElement('div');
        pageDiv.id = `page-${cat.id}`;
        pageDiv.className = `page ${index === 0 ? 'active' : ''}`;

        const grid = document.createElement('div');
        grid.className = 'products-grid';

        // Filtra produtos desta categoria
        const catProducts = products.filter(p => p.category === cat.id);
        
        if (catProducts.length === 0) {
          grid.innerHTML = `<p style="grid-column: 1/-1; text-align:center; color: var(--creme-escuro); padding: 40px 0;">Nenhum item nesta poção por enquanto...</p>`;
        } else {
          catProducts.forEach(prod => {
            const card = document.createElement('div');
            card.className = 'product-card';
            // Configura o clique no card inteiro para abrir a nova função "Ver Mais"
            card.onclick = () => openProductModal(prod);

            card.innerHTML = `
              <div class="product-img-container">
                <img src="${prod.image_url || 'https://images.unsplash.com/photo-1578985545062-69928b1d9587?w=500'}" alt="${prod.name}">
              </div>
              <div class="product-info">
                <h3 class="product-title">${prod.name}</h3>
                <p class="product-desc">${prod.description || 'Delícia artesanal da Lunária Confeitaria feita com ingredientes selecionados.'}</p>
                <div class="product-meta">
                  <span class="product-price">R$ ${Number(prod.price).toFixed(2)}</span>
                  <button class="btn-add" onclick="event.stopPropagation(); addToCart('${prod.id}', '${prod.name}', ${prod.price})">Adicionar</button>
                </div>
              </div>
            `;
            grid.appendChild(card);
          });
        }

        pageDiv.appendChild(grid);
        container.appendChild(pageDiv);
      });
    }

    function switchCategory(catId, btnElement) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      
      const targetPage = document.getElementById(`page-${catId}`);
      if (targetPage) targetPage.classList.add('active');
      if (btnElement) btnElement.classList.add('active');
    }

    function showPage(pageId) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      const p = document.getElementById(`page-${pageId}`);
      if (p) p.classList.add('active');
    }

    // ============================================================
    //  NOVA FUNÇÃO: ENTRAR NO PRODUTO (MODAL/VER MAIS)
    // ============================================================
    function openProductModal(product) {
      const modal = document.getElementById('product-modal');
      
      document.getElementById('modal-product-img').src = product.image_url || 'https://images.unsplash.com/photo-1578985545062-69928b1d9587?w=500';
      document.getElementById('modal-product-title').textContent = product.name;
      document.getElementById('modal-product-desc').textContent = product.description || 'Uma receita mágica exclusiva da nossa cozinha, preparada com amor, equilíbrio de sabores e todo o aconchego que você merece.';
      document.getElementById('modal-product-price').textContent = `R$ ${Number(product.price).toFixed(2)}`;
      
      const actionBtn = document.getElementById('modal-product-action');
      actionBtn.onclick = () => {
        addToCart(product.id, product.name, product.price);
        closeProductModal(true);
      };

      modal.classList.add('active');
    }

    function closeProductModal(forced = false, event = null) {
      if (forced || event.target.id === 'product-modal') {
        document.getElementById('product-modal').classList.remove('active');
      }
    }

    // ============================================================
    //  REGRAS DE NEGÓCIO (CARRINHO & UTILS)
    // ============================================================
    function addToCart(id, name, price) {
      if (!cart[id]) {
        cart[id] = { name, price, qty: 0 };
      }
      cart[id].qty++;
      updateCartSummary();
      showToast(`✓ ${name} adicionado à sacola!`);
    }

    function updateCartSummary() {
      const totalItems = Object.values(cart).reduce((acc, item) => acc + item.qty, 0);
      const summary = document.getElementById('cart-summary');
      if (totalItems > 0) {
        summary.style.display = 'block';
        document.getElementById('cart-count').textContent = totalItems;
      } else {
        summary.style.display = 'none';
      }
    }

    function checkoutWhatsApp() {
      let text = `🔮 *Novo Pedido - Lunária Confeitaria* 🔮\n\n`;
      let total = 0;
      
      Object.values(cart).forEach(item => {
        const sub = item.price * item.qty;
        total += sub;
        text += `• ${item.qty}x *${item.name}* (R$ ${sub.toFixed(2)})\n`;
      });
      
      text += `\n💰 *Total:* R$ ${total.toFixed(2)}`;
      const encoded = encodeURIComponent(text);
      window.open(`https://wa.me/5513999999999?text=${encoded}`, '_blank'); // Altere para seu número real
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    function loginAdmin() {
      const pass = document.getElementById('admin-password').value;
      if (pass === 'suasenha') {
        showToast('Acesso concedido!');
        // Redirecionar ou abrir painel de adição de fotos/produtos
      } else {
        showToast('Senha incorreta.');
      }
    }
  </script>
</body>
</html>
